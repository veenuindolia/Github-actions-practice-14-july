name: Learning Githubactions

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read  

jobs:
  build-and-deploy:
    name: Creating Azure Resources
    runs-on: ubuntu-latest

    steps:

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        
      - name: Checkout Code
        uses: actions/checkout@v6
       

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ./Parent Module
        run: terraform init

      - name: Plan
        working-directory: ./Parent Module
        run: terraform plan

      - name: Apply
        working-directory: ./Parent Module
        run: terraform apply -auto-approve
